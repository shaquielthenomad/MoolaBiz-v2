# MoolaBiz Bot Instance — one per customer
# Deployed automatically by Coolify or manually
version: "3.8"

services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot
    restart: always
    ports:
      - "${BOT_PORT:-3001}:3000"
    env_file:
      - ../.env.bot.local
    volumes:
      - ../workspace:/app/workspace:ro   # Proprietary SOUL.md + skills (read-only)
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull the model on first start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  ollama_data:
